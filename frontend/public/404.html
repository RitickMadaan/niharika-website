<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      const pathSegmentsToKeep = 1;
      const l = window.location;
      const base =
        l.protocol +
        "//" +
        l.hostname +
        (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/");

      const path = l.pathname
        .slice(1)
        .split("/")
        .slice(pathSegmentsToKeep)
        .join("/")
        .replace(/&/g, "~and~");

      const query = l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "";

      l.replace(base + "/?/" + path + query + l.hash);
    </script>
  </head>
  <body></body>
</html>
